<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tinyhouse GUI</title>
<style>
body { margin:0; }
canvas { width:100vw; height:100vh; }
</style>
</head>

<body>
<canvas id="the_canvas"></canvas>

<script type="module">
import init, { start } from "./tinyhouse_ui.js";

async function main() {
  await init();

  const canvas = document.getElementById("the_canvas");
  await start(canvas);
}

main();
</script>

</body>
</html>
